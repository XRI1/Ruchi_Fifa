<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Ruchi Football 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://flagcdn.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="subpage-header simple-subpage">
    <div class="hero-parallax-bg" style="background-image: url('assets/images/stadium_hero.png');"></div>
    <div class="subpage-header-content">
      <h2>Leaderboard</h2>
      <p>See the top players and the leading supporter countries.</p>
    </div>
  </section>

  <section id="leaderboard" class="leaderboard-section reveal-item simple-section">
    <div class="back-nav-wrap simple-back">
      <a href="registration.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>
    <div class="leaderboard-container reveal-item">
      <div class="leaderboard-tabs">
        <button class="leaderboard-tab-btn active" onclick="switchLeaderboard('individual')">Players</button>
        <button class="leaderboard-tab-btn" onclick="switchLeaderboard('country')">Countries</button>
      </div>

      <div class="leaderboard-panels">
        <div class="leaderboard-panel active" id="panel-individual">
          <div class="scoreboard-table-wrap">
            <table class="scoreboard-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Player</th>
                  <th>Team</th>
                  <th style="text-align: right;">Score</th>
                </tr>
              </thead>
              <tbody id="individual-leaderboard-body"></tbody>
            </table>
          </div>
        </div>

        <div class="leaderboard-panel" id="panel-country">
          <div class="scoreboard-table-wrap">
            <table class="scoreboard-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Country</th>
                  <th style="text-align: center;">Score</th>
                  <th style="text-align: right;">Supporters</th>
                </tr>
              </thead>
              <tbody id="country-leaderboard-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer simple-footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Ruchi Football Campaign. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
